version: '3.8'

services:
  prompt-shield-proxy:
    build:
      context: ..
      dockerfile: prompt-shield-api-proxy/Dockerfile
    container_name: prompt-shield-proxy
    ports:
      - "${PROXY_PORT:-8080}:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - PROMPT_SHIELD_PROXY_ENABLED=true
      - PROMPT_SHIELD_PROXY_PROVIDER_BASE_URL=${PROVIDER_BASE_URL:-https://api.openai.com}
      - PROMPT_SHIELD_PROXY_PROVIDER_API_KEY=${PROVIDER_API_KEY}
      - PROMPT_SHIELD_PROXY_PROVIDER_MODEL=${PROVIDER_MODEL:-gpt-4o-mini}
      - PROMPT_SHIELD_PROXY_OBFUSCATION_ENABLED=true
      - PROMPT_SHIELD_PROXY_OBFUSCATION_INJECT_SYSTEM_PROMPT=true
      - PROMPT_SHIELD_PROXY_OBFUSCATION_RESTORE_ON_RESPONSE=true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

