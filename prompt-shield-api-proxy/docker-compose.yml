version: '3.8'

services:
  prompt-shield-proxy:
    build:
      context: ..
      dockerfile: prompt-shield-api-proxy/Dockerfile
    container_name: prompt-shield-proxy
    ports:
      - "${PROXY_PORT:-8080}:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      # Core settings
      - PROMPT_SHIELD_ENABLED=${PROMPT_SHIELD_ENABLED:-true}
      - PROMPT_SHIELD_HASH_ALGORITHM=${PROMPT_SHIELD_HASH_ALGORITHM:-SHA-256}
      - PROMPT_SHIELD_HASH_LENGTH=${PROMPT_SHIELD_HASH_LENGTH:-6}
      - PROMPT_SHIELD_STORAGE_TYPE=${PROMPT_SHIELD_STORAGE_TYPE:-memory}
      - PROMPT_SHIELD_REDACTED_PREFIX=${PROMPT_SHIELD_REDACTED_PREFIX:-REDACTED}
      - PROMPT_SHIELD_TAG_SEPARATOR=${PROMPT_SHIELD_TAG_SEPARATOR:-#}
      - PROMPT_SHIELD_TAG_OPEN=${PROMPT_SHIELD_TAG_OPEN:-~}
      - PROMPT_SHIELD_TAG_CLOSE=${PROMPT_SHIELD_TAG_CLOSE:-~}
      # Proxy settings
      - PROMPT_SHIELD_PROXY_ENABLED=${PROMPT_SHIELD_PROXY_ENABLED:-true}
      - PROMPT_SHIELD_PROXY_BASE_PATH=${PROMPT_SHIELD_PROXY_BASE_PATH:-/v1}
      - PROMPT_SHIELD_PROXY_INJECT_SYSTEM_PROMPT=${PROMPT_SHIELD_PROXY_INJECT_SYSTEM_PROMPT:-true}
      - PROMPT_SHIELD_PROXY_RESTORE_ON_RESPONSE=${PROMPT_SHIELD_PROXY_RESTORE_ON_RESPONSE:-true}
      # Provider settings
      - PROMPT_SHIELD_PROXY_PROVIDER_BASE_URL=${PROMPT_SHIELD_PROXY_PROVIDER_BASE_URL:-https://api.openai.com}
      - PROMPT_SHIELD_PROXY_PROVIDER_API_KEY=${PROMPT_SHIELD_PROXY_PROVIDER_API_KEY}
      - PROMPT_SHIELD_PROXY_PROVIDER_MODEL=${PROMPT_SHIELD_PROXY_PROVIDER_MODEL:-gpt-4o-mini}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

