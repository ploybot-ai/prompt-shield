name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn clean compile -B

    - name: Run tests
      run: mvn test -B

    - name: Generate test report
      if: always()
      uses: dorny/test-reporter@v1
      with:
        name: Maven Tests
        path: '**/surefire-reports/TEST-*.xml'
        reporter: java-junit

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: test-results
        path: '**/surefire-reports/'
        retention-days: 7

  package:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Package
      run: mvn package -B -DskipTests

    - name: Upload JAR artifacts
      uses: actions/upload-artifact@v7
      with:
        name: jars
        path: |
          obfuscador-core/target/*.jar
          obfuscador-spring-boot-starter/target/*.jar
        retention-days: 30
