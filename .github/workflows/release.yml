name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        server-id: central
        server-username: MAVEN_USERNAME
        server-password: MAVEN_PASSWORD
        gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
        gpg-passphrase: MAVEN_GPG_PASSPHRASE

    - name: Build and test
      run: mvn clean verify -B

    - name: Package
      run: mvn package -B -DskipTests

    - name: Get version
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v3
      with:
        name: Release ${{ steps.version.outputs.VERSION }}
        generate_release_notes: true
        files: |
          prompt-shield-core/target/*.jar
          prompt-shield-spring-boot-starter/target/*.jar
          prompt-shield-spring-ai-advisor/target/*.jar
          prompt-shield-storage-jpa/target/*.jar
          prompt-shield-storage-redis/target/*.jar
          prompt-shield-ner-opennlp/target/*.jar
          prompt-shield-api-proxy/target/*.jar
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
