name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Número de versión release (ej: 1.0.1) - SIN SNAPSHOT'
        required: true
        type: string

jobs:
  validate:
    name: Validate version
    runs-on: ubuntu-latest
    steps:
      - name: Validate version format
        run: |
          VERSION="${{ inputs.version }}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: La versión debe tener formato X.Y.Z (ej: 1.0.1)"
            exit 1
          fi
          if [[ "$VERSION" == *"SNAPSHOT"* ]]; then
            echo "ERROR: La versión no puede contener SNAPSHOT"
            exit 1
          fi
          echo "Version validada: $VERSION"

      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check tag does not exist
        run: |
          if git rev-parse "v${{ inputs.version }}" >/dev/null 2>&1; then
            echo "ERROR: El tag v${{ inputs.version }} ya existe"
            exit 1
          fi

  update-version:
    name: Update POM versions
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Update version in all POMs
        run: |
          mvn versions:set -DnewVersion=${{ inputs.version }} -DgenerateBackupPoms=false
          mvn versions:commit

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "release: v${{ inputs.version }}"
          git tag "v${{ inputs.version }}"
          git push origin main --tags

  build-and-test:
    name: Build and test
    needs: update-version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tag
        uses: actions/checkout@v7
        with:
          ref: v${{ inputs.version }}

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and test
        run: mvn clean verify -B

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: '**/surefire-reports/'
          retention-days: 7

  publish-maven:
    name: Publish to Maven Central
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tag
        uses: actions/checkout@v7
        with:
          ref: v${{ inputs.version }}

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Publish to Maven Central
        run: mvn -P release --batch-mode deploy -DskipTests
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

  publish-docker:
    name: Publish Docker image
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tag
        uses: actions/checkout@v7
        with:
          ref: v${{ inputs.version }}

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          maven-version: '3.9.6'

      - name: Build JAR
        run: mvn clean package -DskipTests -pl prompt-shield-api-proxy -am

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ploybot/prompt-shield-api-proxy
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: prompt-shield-api-proxy/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  github-release:
    name: Create GitHub Release
    needs: [publish-maven, publish-docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout tag
        uses: actions/checkout@v7
        with:
          ref: v${{ inputs.version }}

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Package JARs
        run: mvn package -B -DskipTests

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: Release v${{ inputs.version }}
          generate_release_notes: true
          files: |
            prompt-shield-core/target/*.jar
            prompt-shield-spring-boot-starter/target/*.jar
            prompt-shield-spring-ai-advisor/target/*.jar
            prompt-shield-storage-jpa/target/*.jar
            prompt-shield-storage-redis/target/*.jar
            prompt-shield-ner-opennlp/target/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
