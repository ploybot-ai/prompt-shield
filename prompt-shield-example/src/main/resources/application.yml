server:
  port: 8080

spring:
  application:
    name: prompt-shield-example

obfuscador:
  enabled: true
  hash-algorithm: SHA-256
  hash-length: 6
  storage-type: memory
  redacted-prefix: "REDACTED"
  tag-separator: "#"
  custom-types:
    CODIGO_POSTAL:
      pattern: "\d{5}"
    N_CUENTA:
      pattern: "ES\d{22}"
