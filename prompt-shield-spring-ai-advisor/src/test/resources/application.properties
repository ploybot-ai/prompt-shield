# Test configuration
spring.main.banner-mode=off
logging.level.root=INFO
logging.level.com.ploybot.promptshield=DEBUG

# Obfuscation config
obfuscador.enabled=true
obfuscador.hash-algorithm=SHA-256
obfuscador.hash-length=6
obfuscador.storage-type=memory
obfuscador.redacted-prefix=REDACTED
obfuscador.tag-separator=#

# Prompt Shield Advisor config
prompt-shield.advisor.enabled=true
prompt-shield.advisor.order=0
prompt-shield.advisor.restore-on-response=true
