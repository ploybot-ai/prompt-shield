# Test configuration
spring.main.banner-mode=off
logging.level.root=INFO
logging.level.com.ploybot.promptshield=DEBUG

# Prompt Shield config
prompt-shield.enabled=true
prompt-shield.hash-algorithm=SHA-256
prompt-shield.hash-length=6
prompt-shield.storage-type=memory
prompt-shield.redacted-prefix=REDACTED
prompt-shield.tag-separator=#

# Prompt Shield Advisor config
prompt-shield.advisor.enabled=true
prompt-shield.advisor.order=0
prompt-shield.advisor.restore-on-response=true
